<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!--react核⼼包-->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!--react dom相关的包-->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 提供es6和jsx的⽀持-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <!--提供⼀个挂载点-->
    <div id="app"></div>

    <!-- text/babel 用于支持、解析jsx语法 -->
    <script type="text/babel">
      var container = document.getElementById("app");
      var root = ReactDOM.createRoot(container);

      class Welecome extends React.Component {
        state = {
          msg: "我是⼀个状态",
        };
        // 箭头函数的this不会变，它的this永远指向定义时所在的对象
        fn = (p) => {
          console.log(this);
          console.log(p);
        };
        render() {
          // return <button onClick={this.fn}>按钮</button>;
          // 如果需要传参，可以在匿名函数中调⽤箭头函数，传参即可，注意不要直接onClick={this.fn("hello")}这相当于直接调用函数了
          return <button onClick={() => this.fn("hello")}>按钮</button>;
        }
      }

      // var fun = function () {};s
      // 对应匿名函数写法是()=>{}

      root.render(
        <>
          <Welecome />
        </>,
      );
    </script>
  </body>
</html>
