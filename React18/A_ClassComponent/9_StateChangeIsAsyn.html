<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!--react核⼼包-->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!--react dom相关的包-->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 提供es6和jsx的⽀持-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <!--提供⼀个挂载点-->
    <div id="app"></div>

    <!-- text/babel 用于支持、解析jsx语法 -->
    <script type="text/babel">
      var container = document.getElementById("app");
      var root = ReactDOM.createRoot(container);

      class Welecome extends React.Component {
        state = {
          num: 1,
        };
        add = () => {
          this.setState({
            num: this.state.num + 1,
          });
          console.log(this.state.num); //1 所以证明更新是异步的
        };

        add2 = () => {
          for (let i = 0; i < 10; i++) {
            this.setState({
              num: this.state.num + 1,
            });
            console.log(this.state.num); //setState是异步的，所以这里打印10次1，最终this.state.num被更新为2，React会把多次setState合并成一次更新(出于性能考虑，React会批量更新)，所以最终num的值是2而不是11
          }
        };
        
        render() {
          return (
            <>
              <h1>{this.state.num}</h1>
              <button onClick={this.add2}>按钮</button>
            </>
          );
        }
      }

      root.render(
        <>
          <Welecome />
        </>,
      );
    </script>
  </body>
</html>
